<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your Student Task Management account and start organizing your tasks today.">
    <link rel="shortcut icon" href="./assests/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">

    <title>Register — Student Task Manager</title>
</head>

<body class="auth-page">

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

        <!-- Brand -->
        <div class="auth-brand">
            <div class="brand-icon">
                <i class="fa-solid fa-clipboard-list"></i>
            </div>
            <h1>Create Account</h1>
            <p>Get started with your task manager</p>
        </div>

        <!-- Error / Success Messages -->
        <div id="registerError" class="auth-error"></div>
        <div id="registerSuccess" class="auth-success"></div>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form">

            <div class="auth-input-group">
                <label for="registerName">Full Name</label>
                <div class="auth-input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input
                        type="text"
                        id="registerName"
                        placeholder="Enter your full name"
                        autocomplete="name"
                        required
                    >
                </div>
            </div>

            <div class="auth-input-group">
                <label for="registerEmail">Email Address</label>
                <div class="auth-input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input
                        type="email"
                        id="registerEmail"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <div class="auth-input-group">
                <label for="registerPassword">Password</label>
                <div class="auth-input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="registerPassword"
                        placeholder="Create a password"
                        autocomplete="new-password"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('registerPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <!-- Password Strength -->
                <div class="password-strength" id="passwordStrength" style="display: none;">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span class="strength-text" id="strengthText"></span>
                </div>
            </div>

            <div class="auth-input-group">
                <label for="registerConfirmPassword">Confirm Password</label>
                <div class="auth-input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input
                        type="password"
                        id="registerConfirmPassword"
                        placeholder="Confirm your password"
                        autocomplete="new-password"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('registerConfirmPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-submit" id="registerBtn">
                <span>
                    <i class="fa-solid fa-user-plus"></i>
                    Create Account
                </span>
            </button>

        </form>

        <!-- Footer -->
        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </div>

    </div>

    <script src="./js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = "index.html";
        }

        // Password strength indicator
        document.getElementById("registerPassword").addEventListener("input", (e) => {
            const password = e.target.value;
            const strengthContainer = document.getElementById("passwordStrength");
            const strengthFill = document.getElementById("strengthFill");
            const strengthText = document.getElementById("strengthText");

            if (password.length === 0) {
                strengthContainer.style.display = "none";
                return;
            }

            strengthContainer.style.display = "block";
            const strength = getPasswordStrength(password);

            strengthFill.className = "strength-fill";
            strengthText.className = "strength-text";

            if (strength.level) {
                strengthFill.classList.add(strength.level);
                strengthText.classList.add(strength.level);
                strengthText.textContent = strength.text;
            }
        });

        // Register form submission
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            hideAuthError("registerError");

            const name = document.getElementById("registerName").value.trim();
            const email = document.getElementById("registerEmail").value.trim();
            const password = document.getElementById("registerPassword").value;
            const confirmPassword = document.getElementById("registerConfirmPassword").value;
            const btn = document.getElementById("registerBtn");

            // Client-side validation
            if (!name || !email || !password || !confirmPassword) {
                showAuthError("registerError", "Please fill in all fields.");
                return;
            }

            if (name.length < 2) {
                showAuthError("registerError", "Name must be at least 2 characters.");
                return;
            }

            if (password.length < 6) {
                showAuthError("registerError", "Password must be at least 6 characters.");
                return;
            }

            if (password !== confirmPassword) {
                showAuthError("registerError", "Passwords do not match.");
                return;
            }

            setLoading(btn, true);

            try {
                const result = await authRegister(name, email, password);

                if (result.success) {
                    showAuthSuccess("registerSuccess", "Account created successfully! Redirecting to login...");
                    document.getElementById("registerForm").reset();
                    document.getElementById("passwordStrength").style.display = "none";

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } else {
                    const errorMsg = result.errors
                        ? result.errors[0]
                        : result.message || "Registration failed.";
                    showAuthError("registerError", errorMsg);
                }
            } catch (error) {
                showAuthError("registerError", "Something went wrong. Please try again.");
            } finally {
                setLoading(btn, false);
            }
        });
    </script>

</body>

</html>
