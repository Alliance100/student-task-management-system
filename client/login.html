<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your Student Task Management account to manage your tasks and stay productive.">
    <link rel="shortcut icon" href="./assests/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">

    <title>Login — Student Task Manager</title>
</head>

<body class="auth-page">

    <!-- Floating Particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

        <!-- Brand -->
        <div class="auth-brand">
            <div class="brand-icon">
                <i class="fa-solid fa-clipboard-list"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue</p>
        </div>

        <!-- Error Message -->
        <div id="loginError" class="auth-error"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form">

            <div class="auth-input-group">
                <label for="loginEmail">Email Address</label>
                <div class="auth-input-wrapper">
                    <i class="fa-regular fa-envelope"></i>
                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>

            <div class="auth-input-group">
                <label for="loginPassword">Password</label>
                <div class="auth-input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-submit" id="loginBtn">
                <span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Sign In
                </span>
            </button>

        </form>

        <!-- Footer -->
        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create one</a>
        </div>

    </div>

    <script src="./js/auth.js"></script>
    <script>
        // Redirect if already logged in
        if (isAuthenticated()) {
            window.location.href = "index.html";
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            hideAuthError("loginError");

            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const btn = document.getElementById("loginBtn");

            if (!email || !password) {
                showAuthError("loginError", "Please fill in all fields.");
                return;
            }

            setLoading(btn, true);

            try {
                const result = await authLogin(email, password);

                if (result.success) {
                    saveAuth(result.data);
                    window.location.href = "index.html";
                } else {
                    showAuthError("loginError", result.message || "Login failed. Please try again.");
                }
            } catch (error) {
                showAuthError("loginError", "Something went wrong. Please try again.");
            } finally {
                setLoading(btn, false);
            }
        });
    </script>

</body>

</html>
